services:
  db:
    image: postgres:15-alpine
    container_name: pactocar-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: pactocar_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./pactocar-backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./pactocar-backend
    container_name: pactocar-api
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=pactocar_db
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy

  pagos:
    build: ./pactocar-pagos
    container_name: pactocar-pagos
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=pactocar_db
      - JWT_SECRET=${JWT_SECRET}
      # Comunicacion inter-modulo: pagos pide el contrato a contratos-service
      - CONTRATOS_URL=http://contratos:3006
    depends_on:
      db:
        condition: service_healthy

  contratos:
    build: ./pactocar-contratos
    container_name: pactocar-contratos
    ports:
      - "3006:3006"
    environment:
      - PORT=3006
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=pactocar_db
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy

  reputacion:
    build: ./pactocar-reputacion
    container_name: pactocar-reputacion
    ports:
      - "3007:3007"
    environment:
      - PORT=3007
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=pactocar_db
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy

  chat:
    build: ./pactocar-chat
    container_name: pactocar-chat
    ports:
      - "3008:3008"
    environment:
      - PORT=3008
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=pactocar_db
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./pactocar-frontend
      args:
        - VITE_API_URL=http://localhost:3000
        - VITE_PAGOS_URL=http://localhost:3005
        - VITE_CONTRATOS_URL=http://localhost:3006
        - VITE_REPUTACION_URL=http://localhost:3007
        - VITE_CHAT_URL=http://localhost:3008
    container_name: pactocar-web
    ports:
      - "80:80"
    depends_on:
      - backend
      - pagos
      - contratos
      - reputacion
      - chat

volumes:
  pgdata:

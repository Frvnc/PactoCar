name: chat-service - CI/CD/Sec

# Pipeline independiente del modulo chat-service
on:
  push:
    branches: [main]
    paths:
      - 'pactocar-chat/**'
      - '.github/workflows/chat-service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pactocar-chat/**'
      - '.github/workflows/chat-service.yml'

env:
  MODULE_DIR: pactocar-chat
  AWS_REGION: us-east-1
  ECS_CLUSTER: pactocar-cluster
  ECS_SERVICE: pactocar-chat

jobs:
  test:
    name: Test - Jest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'
          cache: npm
          cache-dependency-path: pactocar-chat/package-lock.json
      - name: Instalar dependencias
        run: npm ci
        working-directory: pactocar-chat
      - name: Ejecutar tests
        run: npm test
        working-directory: pactocar-chat

  sast:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Analisis estatico con Semgrep
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" semgrep/semgrep \
            semgrep scan --config p/javascript --config p/security-audit \
            --severity ERROR --error --metrics=off /src/pactocar-chat

  sca:
    name: SCA - Trivy (dependencias)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Escaneo de dependencias (CVEs)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: pactocar-chat
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  secret-scan:
    name: Secret Scanning - Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Escaneo de secretos en el modulo
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" zricethezav/gitleaks:latest \
            dir /repo/pactocar-chat --no-banner --redact --exit-code 1

  iac-scan:
    name: IaC Scanning - Trivy config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Escaneo del Dockerfile / manifiestos
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: pactocar-chat
          severity: CRITICAL,HIGH
          exit-code: '1'

  build:
    name: Docker Build + Trivy + Deploy a ECS
    runs-on: ubuntu-latest
    needs: [test, sast, sca, secret-scan, iac-scan]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      # La imagen se etiqueta con el SHA del commit: cada despliegue queda atado a una
      # version concreta e inmutable. El tag latest se mantiene solo para que la task
      # definition base de Terraform tenga una referencia valida al crearse
      - name: Build y push de la imagen a ECR
        uses: docker/build-push-action@v6
        with:
          context: ./pactocar-chat
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/pactocar-chat:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/pactocar-chat:latest
      - name: Escaneo de la imagen (CVEs criticos)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/pactocar-chat:${{ github.sha }}
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
      # Se parte de la task definition vigente para conservar las variables de entorno
      # que define Terraform, y solo se le cambia la imagen
      - name: Tomar la task definition vigente
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          aws ecs describe-task-definition --task-definition ${{ env.ECS_SERVICE }} \
            --query taskDefinition \
            | jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
            > task-definition.json
      - name: Fijar la imagen recien publicada
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: pactocar-chat
          image: ${{ steps.login-ecr.outputs.registry }}/pactocar-chat:${{ github.sha }}
      - name: Desplegar en ECS Fargate
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

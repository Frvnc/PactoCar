name: contratos-service - CI/CD/Sec

# Pipeline independiente del modulo contratos-service.
on:
  push:
    branches: [main]
    paths:
      - 'pactocar-contratos/**'
      - '.github/workflows/contratos-service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pactocar-contratos/**'
      - '.github/workflows/contratos-service.yml'

env:
  MODULE_DIR: pactocar-contratos
  AWS_REGION: us-east-1
  ECS_CLUSTER: pactocar-cluster
  ECS_SERVICE: pactocar-contratos

jobs:
  test:
    name: Test - Jest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: pactocar-contratos/package-lock.json
      - name: Instalar dependencias
        run: npm ci
        working-directory: pactocar-contratos
      - name: Ejecutar tests
        run: npm test
        working-directory: pactocar-contratos

  sast:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Analisis estatico con Semgrep
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" semgrep/semgrep \
            semgrep scan --config p/javascript --config p/security-audit \
            --severity ERROR --error --metrics=off /src/pactocar-contratos

  sca:
    name: SCA - Trivy (dependencias)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Escaneo de dependencias (CVEs)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: pactocar-contratos
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  secret-scan:
    name: Secret Scanning - Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Escaneo de secretos en el modulo
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" zricethezav/gitleaks:latest \
            dir /repo/pactocar-contratos --no-banner --redact --exit-code 1

  iac-scan:
    name: IaC Scanning - Trivy config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Escaneo del Dockerfile / manifiestos
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: pactocar-contratos
          severity: CRITICAL
          exit-code: '1'

  build:
    name: Docker Build + Trivy + Deploy a ECS
    runs-on: ubuntu-latest
    needs: [test, sast, sca, secret-scan, iac-scan]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build y push de la imagen a ECR
        uses: docker/build-push-action@v6
        with:
          context: ./pactocar-contratos
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/pactocar-contratos:latest
      - name: Escaneo de la imagen (CVEs criticos)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/pactocar-contratos:latest
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
      - name: Desplegar en ECS Fargate
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment

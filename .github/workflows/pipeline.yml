name: PactoCar DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: pactocar-cluster
  ECS_SERVICE: pactocar-api

jobs:

  # ── 1. JEST ──────────────────────────────────────────────────────────────────
  test:
    name: Jest - Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: pactocar-backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: pactocar-backend

      - name: Ejecutar tests con cobertura
        run: npm test -- --coverage
        working-directory: pactocar-backend

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: pactocar-backend/coverage

  # ── 2. SONARCLOUD ────────────────────────────────────────────────────────────
  sonarqube:
    name: SonarCloud - Code Quality
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Descargar reporte de cobertura
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: pactocar-backend/coverage

      - name: Analizar con SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── 3. DOCKER BUILD → ECR ────────────────────────────────────────────────────
  docker-build:
    name: Docker - Build and Push to ECR
    runs-on: ubuntu-latest
    needs: sonarqube
    outputs:
      registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y push backend
        uses: docker/build-push-action@v6
        with:
          context: ./pactocar-backend
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/pactocar-backend:latest

      - name: Build y push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./pactocar-frontend
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/pactocar-frontend:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}

  # ── 4. TRIVY ─────────────────────────────────────────────────────────────────
  trivy:
    name: Trivy - CVE Scan
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Escanear imagen backend
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/pactocar-backend:latest
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL

      - name: Escanear imagen frontend
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/pactocar-frontend:latest
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL

  # ── 5. DEPLOY ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy - ECS + Azure SWA
    runs-on: ubuntu-latest
    needs: trivy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      # Backend → AWS ECS
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy backend a ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment

      # Frontend → Azure Static Web Apps
      - name: Deploy frontend a Azure SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /pactocar-frontend
          output_location: dist
          app_build_command: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

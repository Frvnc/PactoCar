name: core (backend + frontend) - CI/Sec

# Pipeline del core existente (auth, catalogo, reservas, admin + frontend React).
# Adaptado a la Ev4: todo corre en el runner de GitHub, sin despliegue a AWS.
# El "despliegue" se demuestra en local con docker-compose up --build.
on:
  push:
    branches: [main]
    paths:
      - 'pactocar-backend/**'
      - 'pactocar-frontend/**'
      - 'sonar-project.properties'
      - '.github/workflows/pipeline.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pactocar-backend/**'
      - 'pactocar-frontend/**'
      - 'sonar-project.properties'
      - '.github/workflows/pipeline.yml'

jobs:
  # ── CI: Tests unitarios del backend ──────────────────────────────────────────
  test:
    name: Jest - Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: pactocar-backend/package-lock.json
      - name: Instalar dependencias
        run: npm ci
        working-directory: pactocar-backend
      - name: Ejecutar tests con cobertura
        run: npm test -- --coverage
        working-directory: pactocar-backend
      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: pactocar-backend/coverage

  # ── Fase 1: SAST (SonarCloud sobre el codigo del backend) ────────────────────
  sast:
    name: SAST - SonarCloud
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Descargar reporte de cobertura
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: pactocar-backend/coverage
      - name: Analizar con SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── Fase 2: SCA (dependencias del backend) ───────────────────────────────────
  sca:
    name: SCA - Trivy (dependencias)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Escaneo de dependencias (CVEs)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: pactocar-backend
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  # ── Fase 3: Secret Scanning (backend + frontend) ─────────────────────────────
  secret-scan:
    name: Secret Scanning - Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Escaneo de secretos del core
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" zricethezav/gitleaks:latest \
            dir /repo/pactocar-backend --no-banner --redact --exit-code 1
          docker run --rm -v "${{ github.workspace }}:/repo" zricethezav/gitleaks:latest \
            dir /repo/pactocar-frontend --no-banner --redact --exit-code 1

  # ── Fase 4: IaC Scanning (Dockerfiles del core) ──────────────────────────────
  iac-scan:
    name: IaC Scanning - Trivy config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Escaneo del Dockerfile del backend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: pactocar-backend
          severity: CRITICAL
          exit-code: '1'
      - name: Escaneo del Dockerfile del frontend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: pactocar-frontend
          severity: CRITICAL
          exit-code: '1'

  # ── CD local: build de las imagenes + escaneo de imagen ──────────────────────
  build:
    name: Docker Build (local) + Trivy Image
    runs-on: ubuntu-latest
    needs: [test, sast, sca, secret-scan, iac-scan]
    steps:
      - uses: actions/checkout@v4
      - name: Construir imagen backend (local, sin push)
        run: docker build -t pactocar-backend:ci ./pactocar-backend
      - name: Construir imagen frontend (local, sin push)
        run: docker build -t pactocar-frontend:ci ./pactocar-frontend
      - name: Escaneo de la imagen backend (CVEs)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: pactocar-backend:ci
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
      - name: Escaneo de la imagen frontend (CVEs)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: pactocar-frontend:ci
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

name: PactoCar DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── 1. JEST ──────────────────────────────────────────────────────────────────
  test:
    name: Jest - Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: pactocar-backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: pactocar-backend

      - name: Ejecutar tests con cobertura
        run: npm test -- --coverage
        working-directory: pactocar-backend

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: pactocar-backend/coverage

  # ── 2. SONARCLOUD ────────────────────────────────────────────────────────────
  sonarqube:
    name: SonarCloud - Code Quality
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Descargar reporte de cobertura
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: pactocar-backend/coverage

      - name: Analizar con SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── 3. DOCKER BUILD ──────────────────────────────────────────────────────────
  docker-build:
    name: Docker - Build and Push
    runs-on: ubuntu-latest
    needs: sonarqube
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push backend
        uses: docker/build-push-action@v6
        with:
          context: ./pactocar-backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/pactocar-backend:latest

      - name: Build y push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./pactocar-frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/pactocar-frontend:latest

  # ── 4. TRIVY ─────────────────────────────────────────────────────────────────
  trivy:
    name: Trivy - CVE Scan
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Escanear imagen backend
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/pactocar-backend:latest
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL

      - name: Escanear imagen frontend
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/pactocar-frontend:latest
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL

  # ── 5. DEPLOY ────────────────────────────────────────────────────────────────
  deploy:
    name: Railway - Deploy
    runs-on: ubuntu-latest
    needs: trivy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend a Railway
        run: railway up --service pactocar-api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

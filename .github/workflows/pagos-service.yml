name: pagos-service - CI/CD/Sec

# Pipeline independiente del modulo pagos-service.
# Solo se ejecuta cuando cambia su carpeta o su propio workflow.
on:
  push:
    branches: [main]
    paths:
      - 'pactocar-pagos/**'
      - '.github/workflows/pagos-service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pactocar-pagos/**'
      - '.github/workflows/pagos-service.yml'

env:
  MODULE_DIR: pactocar-pagos
  IMAGE: pactocar-pagos:ci

jobs:
  # ── CI: Tests unitarios (Jest) ───────────────────────────────────────────────
  test:
    name: Test - Jest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: pactocar-pagos/package-lock.json
      - name: Instalar dependencias
        run: npm ci
        working-directory: pactocar-pagos
      - name: Ejecutar tests
        run: npm test
        working-directory: pactocar-pagos

  # ── Fase 1 de seguridad: SAST (analisis estatico del codigo) ─────────────────
  sast:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Analisis estatico con Semgrep
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" semgrep/semgrep \
            semgrep scan --config p/javascript --config p/security-audit \
            --severity ERROR --error --metrics=off /src/pactocar-pagos

  # ── Fase 2 de seguridad: SCA (vulnerabilidades en dependencias) ──────────────
  sca:
    name: SCA - Trivy (dependencias)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Escaneo de dependencias (CVEs)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: pactocar-pagos
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  # ── Fase 3 de seguridad: Secret Scanning ─────────────────────────────────────
  secret-scan:
    name: Secret Scanning - Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Escaneo de secretos en el modulo
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" zricethezav/gitleaks:latest \
            dir /repo/pactocar-pagos --no-banner --redact --exit-code 1

  # ── Fase 4 de seguridad: IaC Scanning (Dockerfile) ───────────────────────────
  iac-scan:
    name: IaC Scanning - Trivy config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Escaneo del Dockerfile / manifiestos
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: pactocar-pagos
          severity: CRITICAL
          exit-code: '1'

  # ── CD local: build de la imagen + escaneo de la imagen ──────────────────────
  build:
    name: Docker Build + Trivy + Push GHCR
    runs-on: ubuntu-latest
    needs: [test, sast, sca, secret-scan, iac-scan]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Owner del registro en minusculas
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - name: Construir imagen
        run: docker build -t ghcr.io/${{ env.OWNER }}/pactocar-pagos:latest ./pactocar-pagos
      - name: Escaneo de la imagen (CVEs criticos)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.OWNER }}/pactocar-pagos:latest
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
      - name: Login a GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publicar imagen en GHCR (despliegue continuo al registro)
        if: github.event_name == 'push'
        run: docker push ghcr.io/${{ env.OWNER }}/pactocar-pagos:latest
